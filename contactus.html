<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us - College Complaint System</title>

<link rel="stylesheet" href="index.css">
<link rel="stylesheet" href="contactus.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header class="navbar">
    <div class="logo">
        <i class="fa-solid fa-shield-halved"></i> COLLEGE COMPLAINT AND MANAGEMENT SYSTEM
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="complaintsubmission.html">Register Complaint</a>
        <a href="Status.html">Complaint Status</a>
        <a href="contactus.html">Contact Us</a>
        <a href="login.html" id="nav-login">Login</a>
        <a href="#" id="nav-logout" style="display:none;">Sign Out</a>
    </nav>
</header>

<section class="contact-section">
    <h2>Contact Us</h2>

    <div class="contact-container">

        <div class="contact-info">
            <div class="info-card">
                <i class="fa-solid fa-location-dot"></i>
                <h3>Address</h3>
                <p>Bathinda, India</p>
            </div>

            <div class="info-card">
                <i class="fa-solid fa-phone"></i>
                <h3>Phone</h3>
                <p>+91 99552808XX</p>
            </div>

            <div class="info-card">
                <i class="fa-solid fa-envelope"></i>
                <h3>Email</h3>
                <p>support@college.com</p>
            </div>
        </div>

        <div class="contact-form">
            <form>
                <label>Name</label>
                <input type="text" placeholder="Enter your name">

                <label>Email</label>
                <input type="email" placeholder="Enter your email">

                <label>Message</label>
                <textarea rows="4" placeholder="Write your message"></textarea>

                <button type="submit">
                    <i class="fa-solid fa-paper-plane"></i> Send Message
                </button>
            </form>
        </div>

    </div>
</section>

<footer>
    © 2026 College Complaint And Management System. All rights reserved.
</footer>

<script src="auth.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', updateNav);
</script>
</body>
</html>

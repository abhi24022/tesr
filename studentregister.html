<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Register</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="studentregister.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i> COLLEGE COMPLAINT AND MANAGEMENT SYSTEM
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="complaintsubmission.html">Register Complaint</a>
            <a href="Status.html">Complaint Status</a>
            <a href="contactus.html">Contact Us</a>
            <a href="login.html" id="nav-login">Login</a>
            <a href="#" id="nav-logout" style="display:none;">Sign Out</a>
        </nav>
    </header>


    <main>
        <div>
            <form id="student-register-form">
                <label for="userID">Student ID :</label>
                <input type="number" id="userID" placeholder="Enter Student ID" required><br><br>
                <label for="useremail">E-mail :</label>
                <input type="email" id="useremail" placeholder="Enter email" required><br><br>
                <label for="passward">Password :</label>
                <input type="password" id="passward" placeholder="Enter Password" required><br><br>
                <label for="confirmpass">Confirm Password :</label>
                <input type="password" id="confirmpass" placeholder="Confirm Password" required><br><br>
                <button type="submit">Submit</button>
                <br><br>
            </form>
            <a href="studentlogin.html">Login Here</a>
        </div>
    </main>


    <footer>
         &copy;2026 College Complaint And Management System. All Right Reserved.
    </footer>

    <!-- Auth JavaScript -->
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('student-register-form');
            if (registerForm) {
                registerForm.addEventListener('submit', handleStudentRegister);
            }
            updateNav();
        });
    </script>
</body>
</html>

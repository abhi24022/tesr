<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student login</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="studentlogin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <!-- NAVBAR -->
    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-shield-halved"></i> COLLEGE COMPLAINT AND MANAGEMENT SYSTEM
        </div>
        <nav>
            <a href="index.html">Home</a>
            <a href="complaintsubmission.html">Register Complaint</a>
            <a href="Status.html">Complaint Status</a>
            <a href="contactus.html">Contact Us</a>
            <a href="login.html" id="nav-login">Login</a>
            <a href="#" id="nav-logout" style="display:none;">Sign Out</a>
        </nav>
    </header>


    <main>
        <div>
            <form id="student-login-form">
                <label for="userID">Email ID :</label>
                <input type="email" id="userID" placeholder="Enter Email" required>
                <br><br>
                <label for="userpass">Password :</label>
                <input type="password" id="userpass" placeholder="Enter Password" required>
                <br><br>
                <button type="submit">Submit</button>
                <br><br>
            </form>
            <a href="/studentregister.html">Register Here</a>
        </div>
    </main>


    <footer>
        &copy;2026 College Complaint And Management System. All Right Reserved.
    </footer>

    <!-- Auth JavaScript -->
    <script src="auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('student-login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', handleStudentLogin);
            }
            updateNav();
        });
    </script>
</body>
</html>
